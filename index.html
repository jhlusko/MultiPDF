<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual PDF Controller</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/styles/base.css" />
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Local-first prototype</p>
      <h1>Dual-window PDF Reader</h1>
      <p class="lede">Open one PDF, then launch synchronized left and right reader windows for a dual-screen setup.</p>

      <section class="card">
        <label class="file-picker">
          <span>Choose PDF</span>
          <input id="fileInput" type="file" accept="application/pdf" />
        </label>
        <div class="button-group">
          <button id="openDual" disabled>Open both windows</button>
          <button id="openLeft" disabled>Open left</button>
          <button id="openRight" disabled>Open right</button>
        </div>
      </section>

      <section class="grid">
        <label>Spread mode
          <select id="spreadMode">
            <option value="cover">Cover mode</option>
            <option value="no-cover">No-cover mode</option>
          </select>
        </label>
        <label>Page offset
          <input id="pageOffset" type="number" min="-20" max="20" value="0" />
        </label>
        <label>Zoom
          <input id="zoom" type="range" min="0.5" max="2.5" step="0.05" value="1" />
        </label>
        <label>Rotation
          <select id="rotation">
            <option value="0">0 degrees</option>
            <option value="90">90 degrees</option>
            <option value="180">180 degrees</option>
            <option value="270">270 degrees</option>
          </select>
        </label>
      </section>

      <section class="toolbar">
        <button id="prev" disabled>Previous spread</button>
        <strong id="spreadLabel">No PDF loaded</strong>
        <button id="next" disabled>Next spread</button>
      </section>

      <pre id="status"></pre>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
